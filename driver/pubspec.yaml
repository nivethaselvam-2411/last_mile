name: driver
description: "Shared Auto/Cab Driver App — Flutter MVP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — versions compatible with Flutter 3.24.3 / Dart 3.5.3
  firebase_core: ^3.1.0
  cloud_firestore: ^5.1.0

  # Navigation
  url_launcher: ^6.2.6

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
